function parseBIFF8(buf){const u8=new Uint8Array(buf),dv=new DataView(buf),SS=512;const ds=dv.getInt32(76,true);if(ds<0||(ds+1)*SS+SS>buf.byteLength)throw new Error("FAT");const fat=[];for(let i=0;i<SS/4;i++)fat.push(dv.getInt32((ds+1)*SS+i*4,true));const dr=dv.getInt32(48,true),dO=(dr+1)*SS;let ws=-1,wz=0;for(let i=0;i<16;i++){const e=dO+i*128;if(e+128>buf.byteLength)break;const nl=dv.getUint16(e+64,true);if(nl<=0||nl>64)continue;let nm="";for(let c=0;c<nl-2;c+=2)nm+=String.fromCharCode(dv.getUint16(e+c,true));if(nm==="Workbook"){ws=dv.getInt32(e+116,true);wz=dv.getUint32(e+120,true)}}if(ws<0)throw new Error("NoWB");const wb=new Uint8Array(wz);let cur=ws,wp=0,sf=0;while(cur>=0&&cur<fat.length&&cur!==-1&&cur!==-2&&wp<wz&&sf<5000){const off=(cur+1)*SS,len=Math.min(SS,wz-wp);if(off+len<=buf.byteLength){wb.set(u8.subarray(off,off+len),wp);wp+=len}cur=fat[cur];sf++}if(wp<100)throw new Error("Short");const wv=new DataView(wb.buffer,0,wp);let pos=0;const sb=[],lb=[],nums=[];let lt=0;while(pos+4<=wp){const t=wv.getUint16(pos,true),l=wv.getUint16(pos+2,true);if(l>20000||pos+4+l>wp)break;const s=pos+4;if(t===0x00FC||(t===0x003C&&(lt===0x00FC||lt===0x003C)))for(let i=0;i<l;i++)sb.push(wb[s+i]);else if(t===0x0203&&l>=14)nums.push({r:wv.getUint16(s,true),c:wv.getUint16(s+2,true),v:wv.getFloat64(s+6,true)});else if(t===0x00FD&&l>=10)lb.push({r:wv.getUint16(s,true),c:wv.getUint16(s+2,true),i:wv.getUint32(s+6,true)});lt=t;pos+=4+l}if(sb.length<8)throw new Error("NoSST");const sst=new Uint8Array(sb),sd=new DataView(sst.buffer);const uc=sd.getUint32(4,true),strs=[];let sp=8;for(let si=0;si<uc&&sp+3<=sst.length;si++){const sl=sd.getUint16(sp,true),fl=sst[sp+2];sp+=3;let rc=0,ex=0;if((fl&0x08)&&sp+2<=sst.length){rc=sd.getUint16(sp,true);sp+=2}if((fl&0x04)&&sp+4<=sst.length){ex=sd.getUint32(sp,true);sp+=4}let str="";if(fl&0x01){const bl=sl*2;if(sp+bl>sst.length)break;for(let c=0;c<sl;c++)str+=String.fromCharCode(sd.getUint16(sp+c*2,true));sp+=bl}else{if(sp+sl>sst.length)break;try{str=n function parseHTMLTbl(t){const doc=new DOMParser().parseFromString(t,"text/html");const tables=doc.querySelectorAll("table");if(!tables.length)return null;let best=null,bN=0;tables.forEach(t=>{const n=t.querySelectorAll("tr").length;if(n>bN){bN=n;best=t}});if(!best||bN<2)return null;const res=[];best.querySelectorAll("tr").forEach(tr=>{const row=[];tr.querySelectorAll("td, th").forEach(c=>row.push(c.textContent.trim()));if(row.length>=5)res.push(row)});if(res.length<2)return null;const data=[];for(let i=1;i<res.length;i++){const rd={};res[i].forEach((v,j)=>{rd[j]=v});data.push(rd)}return data}

function calcS(recs,filter){const src=filter?recs.filter(filter):recs;const bT={},bA={};for(const r of src){if(r.ar1==null||r.br1==null)continue;if(!bT[r.at])bT[r.at]={a:[],b:[],d:[],p:[],ba:[]};const t=bT[r.at];t.a.push(r.ar1);t.b.push(r.br1);t.d.push(r.br1-r.ar1);t.p.push(r.pc);t.ba.push(r.ba);if(!r.ag)continue;if(!bA[r.ag])bA[r.ag]={at:r.at,a:[],b:[],d:[],p:[],ba:[]};const aa=bA[r.ag];aa.a.push(r.ar1);aa.b.push(r.br1);aa.d.push(r.br1-r.ar1);aa.p.push(r.pc);aa.ba.push(r.ba)}const mk=v=>({n:v.a.length,am:avg(v.a),as:std(v.a),bm:avg(v.b),bs:std(v.b),dm:avg(v.d),pp:avg(v.p),pb:avg(v.ba)});const ts={},as={};for(const[k,v]of Object.entries(bT))ts[k]=mk(v);for(const[k,v]of Object.entries(bA))as[k]={...mk(v),at:v.at};return{ts,as}}
