on:
  schedule:
    # 매주 화요일, 금요일 00:00 UTC (한국시간 09:00)
    - cron: '0 0 * * 2,5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase DB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Pinging Supabase to prevent auto-pause..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/bid_records?select=count&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Supabase ping successful (HTTP $RESPONSE)"
          else
            echo "❌ Supabase ping failed (HTTP $RESPONSE)"
            exit 1
          fi
          
          echo "Keep-alive completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
