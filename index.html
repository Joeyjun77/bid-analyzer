<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#ebe9e4;--tx:#1a1a1a;--tx2:#666;--tx3:#999;--bd:#ddddd8;--blue:#378ADD;--grn:#1D9E75;--red:#E24B4A}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#252523;--bg3:#2f2f2c;--tx:#e8e8e4;--tx2:#999;--tx3:#777;--bd:#3a3a36;--blue:#5999d6;--grn:#5DCAA5;--red:#F09595}}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;line-height:1.5}
.app{max-width:720px;margin:0 auto;padding:16px}
h1{font-size:18px;font-weight:600}h2{font-size:15px;font-weight:600;margin-bottom:10px}h3{font-size:13px;font-weight:600;margin-bottom:6px}
.sub{font-size:12px;color:var(--tx2)}
.tabs{display:flex;border-bottom:1px solid var(--bd);overflow-x:auto}
#tabbar{position:sticky;top:0;z-index:10;background:var(--bg);padding-top:4px;margin-bottom:16px}
.tab{padding:8px 14px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--tx2);border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.g{display:grid;gap:8px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}
.c{background:var(--bg2);border-radius:8px;padding:10px 12px}
.cb{border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.ca{border:2px solid var(--blue);border-radius:10px;padding:14px}
.ml{font-size:11px;color:var(--tx3);margin-bottom:2px}.mv{font-size:18px;font-weight:600}.ms{font-size:11px;color:var(--tx3);margin-top:2px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap}
.row{display:flex;align-items:center;gap:8px}
.rowb{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd)}
.inp{padding:7px 10px;font-size:12px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);font-family:inherit;width:100%;box-sizing:border-box}
.sel{padding:7px 10px;font-size:12px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);font-family:inherit}
.btn{padding:5px 12px;font-size:12px;border:1px solid var(--bd);border-radius:6px;background:none;color:var(--tx);cursor:pointer;font-family:inherit}
.btn:hover{background:var(--bg2)}.btn:disabled{opacity:.4;cursor:default}
.lnk{color:var(--blue);cursor:pointer;border:none;background:none;font-size:12px;font-family:inherit;padding:0}
.tr{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mono{font-family:ui-monospace,monospace;font-size:12px}
.scr{max-height:400px;overflow-y:auto}
</style>
<div class="app">
<div id="hdr"></div>
<div id="tabbar"></div>
<div id="bar"></div>
<div id="out"></div>
</div>
<script>
// Data — loaded from storage or file upload
let R=[];
let S=[];


const TC={"조달청":{b:"#E6F1FB",t:"#0C447C",d:"#378ADD"},"교육청":{b:"#EEEDFE",t:"#3C3489",d:"#7F77DD"},"지자체":{b:"#E1F5EE",t:"#085041",d:"#1D9E75"},"한국철도공사":{b:"#FAECE7",t:"#712B13",d:"#D85A30"},"교통공사":{b:"#FBEAF0",t:"#72243E",d:"#D4537E"},"국토교통부":{b:"#FAEEDA",t:"#633806",d:"#BA7517"},"LH공사":{b:"#EAF3DE",t:"#27500A",d:"#639922"},"기타":{b:"#F1EFE8",t:"#444441",d:"#888780"}};
const fmt=n=>n!=null?n.toLocaleString('ko-KR'):'-';
const fR=(n,d)=>typeof n==='number'?n.toFixed(d!=null?d:4):'-';
const fM=n=>{if(!n)return'-';if(n>=1e9)return(n/1e9).toFixed(1)+'억';if(n>=1e8)return(n/1e8).toFixed(1)+'억';if(n>=1e7)return(n/1e7).toFixed(0)+'천만';return fmt(n)};
const bg=t=>{const c=TC[t]||TC['기타'];return'<span class="badge" style="background:'+c.b+';color:'+c.t+'">'+t+'</span>'};
const mc=(l,v,s)=>'<div class="c"><div class="ml">'+l+'</div><div class="mv">'+v+'</div>'+(s?'<div class="ms">'+s+'</div>':'')+'</div>';

function spk(d,w,h,showAxis){if(!d||d.length<2)return'';w=w||160;h=h||36;var pad=showAxis?{l:36,r:8,t:8,b:20}:{l:0,r:0,t:3,b:3};var pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;const mn=Math.min(...d),mx=Math.max(...d),rg=mx-mn||1;var s='<svg width="'+w+'" height="'+h+'" style="display:block"><polyline fill="none" stroke="var(--blue)" stroke-width="1.5" stroke-linejoin="round" points="'+d.map((v,i)=>(pad.l+i/(d.length-1)*pw)+','+(pad.t+ph-(v-mn)/rg*ph)).join(' ')+'"/>';if(showAxis){s+='<text x="'+(pad.l-4)+'" y="'+(pad.t+4)+'" text-anchor="end" fill="var(--tx3)" font-size="8">'+fR(mx,2)+'</text>';s+='<text x="'+(pad.l-4)+'" y="'+(pad.t+ph)+'" text-anchor="end" fill="var(--tx3)" font-size="8">'+fR(mn,2)+'</text>';s+='<text x="'+pad.l+'" y="'+(h-2)+'" text-anchor="start" fill="var(--tx3)" font-size="8">과거</text>';s+='<text x="'+(w-pad.r)+'" y="'+(h-2)+'" text-anchor="end" fill="var(--tx3)" font-size="8">최근</text>';s+='<line x1="'+pad.l+'" y1="'+pad.t+'" x2="'+pad.l+'" y2="'+(pad.t+ph)+'" stroke="var(--bd)" stroke-width=".5"/>';s+='<line x1="'+pad.l+'" y1="'+(pad.t+ph)+'" x2="'+(w-pad.r)+'" y2="'+(pad.t+ph)+'" stroke="var(--bd)" stroke-width=".5"/>';var mid=(mn+mx)/2;var my=pad.t+ph-(mid-mn)/rg*ph;s+='<line x1="'+pad.l+'" y1="'+my+'" x2="'+(w-pad.r)+'" y2="'+my+'" stroke="var(--bd)" stroke-width=".3" stroke-dasharray="2 2"/>';s+='<text x="'+(pad.l-4)+'" y="'+(my+3)+'" text-anchor="end" fill="var(--tx3)" font-size="8">'+fR(mid,2)+'</text>'}return s+'</svg>'}
function hst(d,w,h){if(!d||!d.length)return'';w=w||680;h=h||140;var padL=32,padB=28,padT=14;var pw=w-padL,ph=h-padB-padT;const bn=[97,97.5,98,98.5,99,99.5,100,100.5,101,101.5,102,102.5,103],ct=Array(bn.length-1).fill(0);d.forEach(v=>{for(let i=0;i<bn.length-1;i++){if(v>=bn[i]&&v<bn[i+1]){ct[i]++;break}}});const mx=Math.max(...ct,1),bw=pw/(bn.length-1)-2;let s='<svg width="'+w+'" height="'+h+'" style="display:block">';s+='<line x1="'+padL+'" y1="'+padT+'" x2="'+padL+'" y2="'+(padT+ph)+'" stroke="var(--bd)" stroke-width=".5"/>';s+='<line x1="'+padL+'" y1="'+(padT+ph)+'" x2="'+w+'" y2="'+(padT+ph)+'" stroke="var(--bd)" stroke-width=".5"/>';var yTicks=[0,Math.round(mx/2),mx];yTicks.forEach(t=>{var y=padT+ph-(t/mx)*ph;s+='<text x="'+(padL-4)+'" y="'+(y+3)+'" text-anchor="end" fill="var(--tx3)" font-size="8">'+t+'</text>';if(t>0)s+='<line x1="'+padL+'" y1="'+y+'" x2="'+w+'" y2="'+y+'" stroke="var(--bd)" stroke-width=".3" stroke-dasharray="2 2"/>'});ct.forEach((c,i)=>{const x=padL+i*(pw/(bn.length-1))+1,bh=(c/mx)*ph,cl=bn[i]<100?'var(--blue)':'var(--grn)';s+='<rect x="'+x+'" y="'+(padT+ph-bh)+'" width="'+bw+'" height="'+bh+'" fill="'+cl+'" opacity=".55" rx="2"/>';s+='<text x="'+(x+bw/2)+'" y="'+(h-padB+12)+'" text-anchor="middle" fill="var(--tx3)" font-size="9">'+bn[i]+'</text>';if(c)s+='<text x="'+(x+bw/2)+'" y="'+(padT+ph-bh-4)+'" text-anchor="middle" fill="var(--tx2)" font-size="9">'+c+'</text>'});var refX=padL+((100-97)/6)*pw;s+='<line x1="'+refX+'" y1="'+padT+'" x2="'+refX+'" y2="'+(padT+ph)+'" stroke="var(--red)" stroke-width=".5" stroke-dasharray="2 2"/>';s+='<text x="'+(w/2)+'" y="'+(h-2)+'" text-anchor="middle" fill="var(--tx3)" font-size="8">사정율(%)</text>';s+='<text x="4" y="'+(padT+ph/2)+'" fill="var(--tx3)" font-size="8" transform="rotate(-90,8,'+(padT+ph/2)+')">건수</text>';return s+'</svg>'}
function gss(mean,std,w,h,pr){w=w||640;h=h||120;var padL=6,padB=24,padT=16;var pw=w-padL,ph=h-padB-padT;const xN=mean-3.5*std,xX=mean+3.5*std,pts=[];for(let i=0;i<=50;i++){const x=xN+(i/50)*(xX-xN),z=(x-mean)/std;pts.push({x,y:Math.exp(-.5*z*z)/(std*Math.sqrt(2*Math.PI))})}const mY=Math.max(...pts.map(p=>p.y)),sv=pts.map(p=>(padL+(p.x-xN)/(xX-xN)*pw)+','+(padT+ph-(p.y/mY)*ph)).join(' ');let s='<svg width="'+w+'" height="'+h+'" style="display:block"><polygon fill="var(--blue)" opacity=".08" points="'+padL+','+(padT+ph)+' '+sv+' '+(padL+pw)+','+(padT+ph)+'"/><polyline fill="none" stroke="var(--blue)" stroke-width="1.5" points="'+sv+'"/>';s+='<line x1="'+padL+'" y1="'+(padT+ph)+'" x2="'+(padL+pw)+'" y2="'+(padT+ph)+'" stroke="var(--bd)" stroke-width=".5"/>';var meanX=padL+pw/2;s+='<line x1="'+meanX+'" y1="'+padT+'" x2="'+meanX+'" y2="'+(padT+ph)+'" stroke="var(--bd)" stroke-width=".5" stroke-dasharray="3 3"/>';s+='<text x="'+meanX+'" y="'+(h-2)+'" text-anchor="middle" fill="var(--tx3)" font-size="9">μ '+fR(mean,2)+'%</text>';var ticks=[xN,mean-2*std,mean-std,mean,mean+std,mean+2*std,xX];ticks.forEach(t=>{var tx=padL+(t-xN)/(xX-xN)*pw;if(Math.abs(t-mean)>std*0.3)s+='<text x="'+tx+'" y="'+(h-2)+'" text-anchor="middle" fill="var(--tx3)" font-size="8">'+fR(t,1)+'</text>'});var s1l=padL+(mean-std-xN)/(xX-xN)*pw,s1r=padL+(mean+std-xN)/(xX-xN)*pw;s+='<line x1="'+s1l+'" y1="'+(padT+ph-2)+'" x2="'+s1l+'" y2="'+(padT+ph+4)+'" stroke="var(--tx3)" stroke-width=".5"/>';s+='<line x1="'+s1r+'" y1="'+(padT+ph-2)+'" x2="'+s1r+'" y2="'+(padT+ph+4)+'" stroke="var(--tx3)" stroke-width=".5"/>';if(pr!=null){const px=padL+(pr-xN)/(xX-xN)*pw;if(px>=padL&&px<=padL+pw){s+='<line x1="'+px+'" y1="'+padT+'" x2="'+px+'" y2="'+(padT+ph)+'" stroke="var(--red)" stroke-width="1.5"/>';s+='<text x="'+px+'" y="'+(padT-3)+'" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">예측 '+fR(pr,3)+'%</text>'}}return s+'</svg>'}

function prd(on){const rc=R.filter(r=>r[0]===on).sort((a,b)=>b[2].localeCompare(a[2]));if(rc.length<2){const s=S.find(o=>o.n===on);return s?{p:s.m,c:'낮음',r:[s.m-1,s.m+1],s:s.s,tr:'부족'}:null}const rt=rc.slice(0,20).map(r=>r[3]),wt=rt.map((_,i)=>Math.exp(-i*.25)),wS=wt.reduce((a,b)=>a+b,0),wM=rt.reduce((a,v,i)=>a+v*wt[i],0)/wS,tr=rt.length>=5?(rt.slice(0,3).reduce((a,b)=>a+b,0)/3-rt.slice(-3).reduce((a,b)=>a+b,0)/3)*.2:0,p=Math.round((wM+tr)*1e4)/1e4,sm=S.find(o=>o.n===on),sd=sm?.s||.5;return{p,c:sd<.55?'높음':sd<.8?'보통':'낮음',r:[Math.round((p-sd)*1e4)/1e4,Math.round((p+sd)*1e4)/1e4],s:sd,tr:tr>.02?'상승':tr<-.02?'하락':'보합'}}

// 낙찰하한율 자동산출 (업종+추정가격+부족점수 기반)
function calcRate(type,est,shortage){
  shortage=parseInt(shortage)||0;
  // 전기/통신/소방 기준 (교육자료 기반)
  if(['전기','통신','소방'].includes(type)){
    if(est<80000000){// 8천만 미만: 90점 배점
      var target=85+shortage; // 만점시 85, 1점부족시 86 ...
      // 90-20×|(0.88-x)×100|=target → x=0.88-(90-target)/2000
      return Math.round((0.88-(90-target)/2000)*100000)/1000;
    }else if(est<150000000){// 1.5억 미만 (조달청 8천만~3억)
      var target=85+shortage;
      return Math.round((0.88-(90-target)/2000)*100000)/1000;
    }else if(est<300000000){// 1.5억~3억 (지자체: 80점배점)
      var target=75+shortage;
      return Math.round((0.88-(80-target)/2000)*100000)/1000;
    }else{// 3억 이상: 70점 배점
      var target=65+shortage;
      // 70-4×|(0.88-x)×100|=target → x=0.88-(70-target)/400
      return Math.round((0.88-(70-target)/400)*100000)/1000;
    }
  }
  // 건축/토목 기본값
  if(est<300000000)return shortage?87.795:87.745;
  return shortage?86.795:86.745;
}

// 예가폭 보정 예측
function prdAdv(on,spread){
  var base=prd(on);
  if(!base)return null;
  // 예가폭이 지정되면 표준편차를 이론적 범위로 보정
  // 복수예가 15개 중 4개 평균 → 중심극한정리: σ_예정 ≈ (예가폭범위) / (2×√12×√4)
  // ±3% → 범위6%, σ≈6/(2×3.464×2)=0.433
  // ±2% → 범위4%, σ≈4/(2×3.464×2)=0.289
  // 0~-6% → 범위6%, σ≈0.433, 평균 -3% 오프셋
  if(spread&&!isNaN(parseFloat(spread))){
    var sp=parseFloat(spread);
    var range=sp===6?6:(sp*2);// ±sp% → range=sp*2, 0~-6% → range=6
    var theoSd=range/(2*Math.sqrt(12)*2);// 이론적 σ
    // 실제 데이터의 σ와 이론적 σ의 가중평균 (데이터 많으면 데이터 우선)
    var sm=S.find(o=>o.n===on);
    var dataCount=sm?sm.c:0;
    var dataW=Math.min(dataCount/20,1);// 20건 이상이면 데이터 100% 신뢰
    var adjSd=dataW*base.s+(1-dataW)*theoSd;
    // 0~-6% 같은 비대칭 범위면 예측값도 보정
    var adjP=base.p;
    if(sp===6){// 0%~-6% 범위: 평균이 -3%쪽으로 치우침
      var bias=-3;// 100%-3%=97% 중심
      adjP=dataW*base.p+(1-dataW)*(100+bias/(2*Math.sqrt(12)*2));
    }
    return{
      p:Math.round(adjP*1e4)/1e4,
      c:adjSd<0.4?'높음':adjSd<0.7?'보통':'낮음',
      r:[Math.round((adjP-adjSd)*1e4)/1e4,Math.round((adjP+adjSd)*1e4)/1e4],
      s:Math.round(adjSd*1e4)/1e4,
      tr:base.tr,
      adjusted:true,
      theoSd:Math.round(theoSd*1e4)/1e4
    };
  }
  return base;
}

// State
let TAB='dashboard', ORG=null, PG=0;

// 탭별 입력값 캐시
const _ts={
  orgs:{isrch:'',ityp:'전체',isort:'name',PG:0,ORG:null,scroll:0},
  predict:{ipsrch:'',iporg:'',ipbase:'',ipest:'',ipaval:'',iplimit:'',iptype:'전기',ipspread:'',ipshort:'0',ipjoint:'no',scroll:0},
  upload:{mgSrch:'',mgTyp:'전체',PG:0,scroll:0},
  dashboard:{scroll:0},
  guide:{scroll:0}
};

function _saveTab(){
  var s=_ts[TAB];if(!s)return;
  s.scroll=document.getElementById('out').scrollTop||window.scrollY||0;
  if(TAB==='orgs'){s.isrch=getV('isrch');s.ityp=getV('ityp');s.isort=getV('isort');s.PG=PG;s.ORG=ORG}
  else if(TAB==='predict'){s.ipsrch=getV('ipsrch');s.iporg=getV('iporg');s.ipbase=getV('ipbase');s.ipest=getV('ipest');s.ipaval=getV('ipaval');s.iplimit=getV('iplimit');s.iptype=getV('iptype');s.ipspread=getV('ipspread');s.ipshort=getV('ipshort');s.ipjoint=getV('ipjoint')}
  else if(TAB==='upload'){s.mgSrch=getV('mgSrch');s.mgTyp=getV('mgTyp');s.PG=PG}
}
function _restoreTab(){
  var s=_ts[TAB];if(!s)return;
  if(TAB==='orgs'){ORG=s.ORG;PG=s.PG}
  else if(TAB==='upload'){PG=s.PG}
}
function _restoreInputs(){
  var s=_ts[TAB];if(!s)return;
  if(TAB==='orgs'){_setV('isrch',s.isrch);_setV('ityp',s.ityp);_setV('isort',s.isort)}
  else if(TAB==='predict'){_setV('ipsrch',s.ipsrch);_setV('iporg',s.iporg);_setV('ipbase',s.ipbase);_setV('ipest',s.ipest);_setV('ipaval',s.ipaval);_setV('iplimit',s.iplimit);_setV('iptype',s.iptype);_setV('ipspread',s.ipspread);_setV('ipshort',s.ipshort);_setV('ipjoint',s.ipjoint)}
  else if(TAB==='upload'){_setV('mgSrch',s.mgSrch);_setV('mgTyp',s.mgTyp)}
  requestAnimationFrame(function(){window.scrollTo(0,s.scroll||0)});
}
function _setV(id,v){var e=document.getElementById(id);if(e&&v!=null)e.value=v}

// Input elements are never destroyed - they live in #bar

function go(t){
  if(t===TAB)return;
  _saveTab();
  TAB=t;
  _restoreTab();
  drawHdr();drawBar();drawOut();
  _restoreInputs();
  // predict 탭은 입력 복원 후 orgList 재렌더링 필요
  if(TAB==='predict'){
    var iporg=document.getElementById('iporg');
    var ips=document.getElementById('ipsrch');
    if(iporg&&ips&&iporg.value){
      ips.value=iporg.value;
      renderOrgList(iporg.value);
    }
  }
}
function drawHdr(){
  document.getElementById('hdr').innerHTML='<div style="margin-bottom:8px"><h1>전기공사 입찰 사정율 분석</h1><p class="sub">'+fmt(R.length)+'건 · '+S.length+'개 발주처</p></div>';
  let tabs='<div class="tabs">';
  [['dashboard','대시보드'],['orgs','발주처 DB'],['predict','투찰 예측'],['upload','데이터 관리'],['guide','가이드']].forEach(function(t){tabs+='<button class="tab'+(TAB===t[0]?' on':'')+'" data-t="'+t[0]+'">'+t[1]+'</button>'});
  tabs+='</div>';
  document.getElementById('tabbar').innerHTML=tabs;
  document.getElementById('tabbar').querySelectorAll('.tab').forEach(function(b){b.onclick=function(){go(b.dataset.t);document.getElementById('tabbar').scrollIntoView({behavior:'smooth',block:'start'})}});
}

function drawBar(){
  const el=document.getElementById('bar');
  const types=['전체',...new Set(S.map(o=>o.t))];
  let h='';

  if(TAB==='orgs'&&!ORG){
    h+='<div style="display:grid;gap:8px;margin-bottom:10px"><div class="row"><input class="inp" id="isrch" placeholder="발주처 검색..." style="flex:1"><select class="sel" id="ityp">'+types.map(t=>'<option>'+t+'</option>').join('')+'</select></div><div class="row" style="gap:6px"><span class="sub" style="white-space:nowrap">정렬</span><select class="sel" id="isort"><option value="name">가나다순</option><option value="count">입찰건수순</option><option value="wins">낙찰건수순</option></select></div></div>';
  }

  if(TAB==='predict'){
    h+='<div class="g" style="gap:10px;margin-bottom:14px">';
    h+='<div><div class="ml">발주처 검색 ('+S.length+'곳)</div><input class="inp" id="ipsrch" placeholder="발주처명을 입력하세요..."><div id="orgList" style="max-height:200px;overflow-y:auto;margin-top:4px"></div><input type="hidden" id="iporg"></div>';

function renderOrgList(q){
  var orgL=document.getElementById('orgList');
  var iporg=document.getElementById('iporg');
  var ips=document.getElementById('ipsrch');
  if(!orgL)return;
  var filtered=S.filter(function(o){return !q||o.n.indexOf(q)>=0}).slice(0,30);
  var h='';
  if(q&&q.length>0&&filtered.length>0){
    filtered.forEach(function(o){
      var sel=iporg&&iporg.value===o.n;
      h+='<div class="orgitem" data-on="'+o.n+'" style="padding:7px 10px;border-bottom:1px solid var(--bd);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;'+(sel?'background:var(--bg2);font-weight:500':'')+'">'
        +'<div style="flex:1;min-width:0"><div class="tr" style="font-weight:500">'+o.n+'</div><div style="font-size:11px;color:var(--tx2)">μ'+fR(o.m,3)+'% · σ'+fR(o.s,3)+' · '+o.c+'건</div></div>'
        +bg(o.t)+'</div>';
    });
  }else if(!q||q.length===0){
    h+='<div style="padding:10px;font-size:12px;color:var(--tx3);text-align:center">발주처명을 입력하면 목록이 표시됩니다</div>';
  }else{
    h+='<div style="padding:10px;font-size:12px;color:var(--tx3);text-align:center">검색 결과가 없습니다</div>';
  }
  orgL.innerHTML=h;
  orgL.querySelectorAll('.orgitem').forEach(function(el){
    el.onmouseenter=function(){this.style.background='var(--bg2)'};
    el.onmouseleave=function(){this.style.background=(iporg&&iporg.value===this.dataset.on)?'var(--bg2)':''};
    el.onclick=function(){
      if(iporg)iporg.value=this.dataset.on;
      if(ips)ips.value=this.dataset.on;
      renderOrgList(this.dataset.on);
      drawOut();
    };
  });
}

function setupPredictSearch(){
  var ips=document.getElementById('ipsrch');
  var iporg=document.getElementById('iporg');
  if(!ips)return;
  ips.oninput=function(){
    renderOrgList(this.value);
    if(!this.value&&iporg){iporg.value='';drawOut()}
  };
  // 초기 렌더
  if(iporg&&iporg.value){ips.value=iporg.value;renderOrgList(iporg.value)}
  else{renderOrgList('')}
}

  let totalParsed=[];

        if(typeof XLSX==='undefined'){
          re.innerHTML='<div class="sub">Excel 라이브러리 로딩 중...</div>';

      }

  }

  re.innerHTML='<div class="sub">'+files.length+'개 파일에서 '+totalParsed.length+'건 파싱 완료. 중복 확인 중...</div>';
  const exBn=new Set();R.forEach(r=>{if(r[9])exBn.add(r[9])});
  const dups=[],news=[];

    re.innerHTML=h;return;
  }

          });
        }
        const ab=await file.arrayBuffer();
        const wb=XLSX.read(ab,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      }else if(file.name.endsWith('.json')){
        rows=JSON.parse(await file.text());
      }else{
        const text=await file.text();
        const ls=text.split('\n').filter(l=>l.trim());
        if(ls.length<2)continue;
        const hd=ls[0].split(',').map(h=>h.trim().replace(/"/g,''));
        rows=ls.slice(1).map(l=>{const v=l.split(',').map(x=>x.trim().replace(/"/g,''));const o={};hd.forEach((h,i)=>o[h]=v[i]);return o});
      }
      if(!rows||!rows.length)continue;
      const isNak=rows[0]&&('발주기관' in rows[0])&&('예가/기초(100%)' in rows[0]);
      if(isNak){
        for(const r of rows){const org=r['발주기관'];const rate=parseFloat(r['예가/기초(100%)']);if(!org||isNaN(rate))continue;totalParsed.push({o:org,t:classifyOrg(org),d:String(r['개찰일']||'').substring(0,14),r:Math.round(rate*1e4)/1e4,b:parseInt(String(r['기초금액']||0).toString().replace(/,/g,''))||0,n:String(r['공고명']||'').substring(0,40),bn:String(r['공고번호']||'')})}
      }else{
        for(const r of rows){const org=r['발주처']||r.org||r['발주기관'];const rate=parseFloat(r['발주처사정율']||r['사정율']||r.rate||r['예가/기초(100%)']);if(!org||isNaN(rate))continue;totalParsed.push({o:org,t:classifyOrg(org),d:String(r['개찰일']||r.date||'').substring(0,14),r:Math.round(rate*1e4)/1e4,b:parseInt(String(r['기초금액']||r.base||0).toString().replace(/,/g,''))||0,n:String(r['공고명']||r.name||'').substring(0,40),bn:String(r['공고번호']||r['입찰공고번호']||r.bid_no||'')})}
      }
    }catch(err){re.innerHTML+='<div style="color:var(--red);font-size:11px">'+file.name+': '+err.message+'</div>'}
  }
  if(!totalParsed.length){re.innerHTML='<div style="color:var(--red)">유효 데이터 없음. 파일 형식을 확인해 주세요.</div>';return}
  addParsed(totalParsed);
  re.innerHTML='<div style="color:var(--grn);font-weight:500">'+totalParsed.length+'건 로드 완료!</div>';
  TAB='dashboard';drawHdr();drawBar();drawOut();
}

// ── BOOT ──
(async function boot(){
  // 1) storage에서 로드 시도
  try{
    const meta=await window.storage.get('bid-v2-meta');
    if(meta&&meta.value){
      const m=JSON.parse(meta.value);
      if(m.total>0){
        const d0=await window.storage.get('bid-v2-p0');
        const d1=await window.storage.get('bid-v2-p1');
        const ds=await window.storage.get('bid-v2-sm');
        if(d0&&d0.value)R=R.concat(JSON.parse(d0.value));
        if(d1&&d1.value)R=R.concat(JSON.parse(d1.value));
        if(ds&&ds.value)S=JSON.parse(ds.value);
      }
    }
  }catch(e){}
  // 2) UI 렌더링 (데이터 유무 상관없이)
  drawHdr();drawBar();drawOut();
})();
</script>
